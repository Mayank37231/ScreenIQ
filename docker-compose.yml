services:
  postgres:
    image: postgres:16-alpine
    container_name: screeniq-postgres
    environment:
      POSTGRES_DB: screeniq
      POSTGRES_USER: screeniq
      POSTGRES_PASSWORD: screeniq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screeniq -d screeniq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
